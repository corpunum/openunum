<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenUnum Console</title>
  <style>
    :root {
      --bg: #0b1220;
      --bg2: #0f172a;
      --panel: #111a2e;
      --panel2: #15213a;
      --text: #e6edf8;
      --muted: #90a0bd;
      --accent: #22d3ee;
      --border: #223052;
      --bubble-user: #1e3a8a;
      --bubble-ai: #1f2937;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      background:
        radial-gradient(1200px 600px at 90% -10%, #102745 0%, transparent 50%),
        radial-gradient(900px 500px at -10% 0%, #1f1240 0%, transparent 45%),
        linear-gradient(165deg, var(--bg), var(--bg2));
      min-height: 100vh;
    }
    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 0;
    }
    .sidebar {
      border-right: 1px solid var(--border);
      background: linear-gradient(180deg, #0e172b, #0b1426);
      overflow: auto;
      padding: 12px;
    }
    .brand {
      font-weight: 700;
      letter-spacing: .4px;
      margin-bottom: 10px;
      font-size: 1.05rem;
    }
    .status { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .card h3 {
      margin: 0 0 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: #d7e3ff;
    }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    input, select, textarea, button {
      border-radius: 10px;
      border: 1px solid #2a395f;
      background: #0c1427;
      color: var(--text);
      padding: 9px 10px;
      font-size: 13px;
    }
    input, select { flex: 1; min-width: 0; }
    textarea { width: 100%; min-height: 86px; resize: vertical; }
    button {
      cursor: pointer;
      white-space: nowrap;
      background: linear-gradient(180deg, #1e335d, #172b50);
    }
    button.primary { background: linear-gradient(180deg, #0891b2, #0e7490); border-color: #0ea5b7; }
    .hint { color: var(--muted); font-size: 12px; }
    .main {
      display: grid;
      grid-template-rows: 56px 1fr 80px;
      min-width: 0;
    }
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 15, 30, .65);
      backdrop-filter: blur(6px);
    }
    .chat-title { font-size: 14px; font-weight: 600; }
    .chat-sub { font-size: 12px; color: var(--muted); }
    .messages {
      overflow: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .bubble-wrap { display: flex; }
    .bubble-wrap.user { justify-content: flex-end; }
    .bubble-wrap.ai { justify-content: flex-start; }
    .bubble {
      max-width: min(78%, 860px);
      border-radius: 16px;
      padding: 10px 12px;
      line-height: 1.45;
      border: 1px solid #2a395f;
      box-shadow: 0 8px 18px rgba(0,0,0,.2);
    }
    .bubble.user {
      background: linear-gradient(180deg, #1d4ed8, #1e40af);
      border-color: #3b82f6;
      border-bottom-right-radius: 6px;
    }
    .bubble.ai {
      background: linear-gradient(180deg, #1f2937, #111827);
      border-color: #374151;
      border-bottom-left-radius: 6px;
    }
    .bubble pre {
      background: #0a0f1d;
      color: #d8e2ff;
      padding: 8px;
      border-radius: 8px;
      overflow: auto;
    }
    .composer {
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
      background: rgba(10, 15, 30, .8);
      backdrop-filter: blur(6px);
    }
    .composer input {
      height: 44px;
      border-radius: 999px;
      padding: 0 14px;
    }
    .composer button {
      height: 44px;
      border-radius: 999px;
      min-width: 90px;
    }
    @media (max-width: 1050px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 46vh 54vh; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">OpenUnum Control</div>
      <div class="status" id="topStatus">booting...</div>

      <section class="card">
        <h3>Model</h3>
        <div class="row">
          <select id="provider">
            <option value="ollama">ollama</option>
            <option value="openrouter">openrouter</option>
            <option value="nvidia">nvidia</option>
            <option value="generic">generic</option>
          </select>
          <button id="switchModel">Switch</button>
        </div>
        <div class="row">
          <input id="model" placeholder="model id" />
        </div>
        <div class="row">
          <button id="importOpenclaw">Import OpenClaw Keys</button>
          <button id="loadModels">Load Ranked</button>
        </div>
        <div class="row">
          <select id="modelList"></select>
          <button id="useListedModel">Use</button>
        </div>
        <div class="hint" id="modelCatalogStatus"></div>
      </section>

      <section class="card">
        <h3>Browser</h3>
        <div class="row">
          <input id="cdpUrl" placeholder="http://127.0.0.1:9222" />
          <button id="saveCdp">Save</button>
        </div>
        <div class="row">
          <button id="launchBrowser">Launch Debug Browser</button>
          <button id="extractBtn">Extract</button>
        </div>
        <div class="row">
          <input id="navUrl" placeholder="https://example.com" />
          <button id="navBtn">Go</button>
        </div>
        <div class="row">
          <input id="searchQ" placeholder="search query" />
          <button id="searchBtn">Search</button>
        </div>
        <div class="hint" id="browserStatusLine"></div>
      </section>

      <section class="card">
        <h3>Telegram</h3>
        <div class="row">
          <input id="tgToken" placeholder="bot token" />
          <button id="saveToken">Save</button>
        </div>
        <div class="row">
          <button id="startTg">Start</button>
          <button id="stopTg">Stop</button>
          <button id="tgRefresh">Refresh</button>
        </div>
        <div class="hint" id="tgStatus"></div>
      </section>

      <section class="card">
        <h3>Operator</h3>
        <div class="row">
          <label class="hint" style="display:flex;align-items:center;gap:6px;">
            <input type="checkbox" id="shellEnabled" />
            shell enabled
          </label>
          <input id="maxIters" type="number" min="1" max="20" placeholder="iters" />
          <button id="saveRuntime">Save</button>
        </div>
        <div class="row">
          <input id="shellCmd" placeholder="shell command" />
          <button id="runShell">Run</button>
        </div>
        <div class="row">
          <input id="openTarget" placeholder="open target" />
          <button id="openTargetBtn">Open</button>
        </div>
        <div class="row">
          <input id="xdotoolCmd" placeholder="xdotool cmd" />
          <button id="runXdotool">xdo</button>
        </div>
        <textarea id="pcOutput" placeholder="tool output..." readonly></textarea>
        <div class="hint" id="runtimeStatus"></div>
      </section>
    </aside>

    <section class="main">
      <header class="chat-header">
        <div>
          <div class="chat-title">Agent Chat</div>
          <div class="chat-sub">Messaging-style timeline</div>
        </div>
        <div class="chat-sub" id="chatMeta">session</div>
      </header>

      <div class="messages" id="chat"></div>

      <footer class="composer">
        <input id="message" placeholder="Type a message..." />
        <button class="primary" id="send">Send</button>
      </footer>
    </section>
  </div>

  <script>
    let sessionId = localStorage.getItem('openunum_session') || crypto.randomUUID();
    localStorage.setItem('openunum_session', sessionId);

    const q = (id) => document.getElementById(id);
    const topStatus = q('topStatus');
    const chat = q('chat');
    q('chatMeta').textContent = sessionId;

    const jget = async (path) => (await fetch(path)).json();
    const jpost = async (path, body) =>
      (await fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body || {}) })).json();

    function pushMsg(role, text, html) {
      const wrap = document.createElement('div');
      wrap.className = `bubble-wrap ${role === 'user' ? 'user' : 'ai'}`;
      const bubble = document.createElement('div');
      bubble.className = `bubble ${role === 'user' ? 'user' : 'ai'}`;
      bubble.innerHTML = html || text;
      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    async function refreshModel() {
      const m = await jget('/api/model/current');
      q('provider').value = m.provider;
      q('model').value = m.model;
      topStatus.textContent = `model=${m.provider}/${m.model}`;
    }

    async function refreshRuntime() {
      const c = await jget('/api/config');
      q('shellEnabled').checked = Boolean(c.runtime?.shellEnabled);
      q('maxIters').value = c.runtime?.maxToolIterations ?? 8;
      q('runtimeStatus').textContent = `shell=${c.runtime?.shellEnabled} maxIters=${c.runtime?.maxToolIterations}`;
    }

    async function refreshTelegram() {
      const [cfg, st] = await Promise.all([jget('/api/telegram/config'), jget('/api/telegram/status')]);
      q('tgStatus').textContent = `token=${cfg.hasToken ? 'set' : 'missing'} enabled=${cfg.enabled} running=${st.running}`;
    }

    async function refreshBrowserConfig() {
      const c = await jget('/api/browser/config');
      q('cdpUrl').value = c.cdpUrl || 'http://127.0.0.1:9222';
      const st = await jget('/api/browser/status');
      q('browserStatusLine').textContent = st.ok ? 'connected' : `${st.error}${st.hint ? ' | ' + st.hint : ''}`;
    }

    q('switchModel').onclick = async () => {
      const out = await jpost('/api/model/switch', { provider: q('provider').value, model: q('model').value });
      topStatus.textContent = `model=${out.provider}/${out.model}`;
    };

    q('importOpenclaw').onclick = async () => {
      const out = await jpost('/api/providers/import-openclaw', {});
      q('modelCatalogStatus').textContent =
        `imported: openrouter=${out.imported?.openrouterApiKey} nvidia=${out.imported?.nvidiaApiKey}`;
    };

    q('loadModels').onclick = async () => {
      const provider = q('provider').value;
      const out = await jget(`/api/models?provider=${encodeURIComponent(provider)}`);
      const list = q('modelList');
      list.innerHTML = '';
      const models = out.models || [];
      for (const m of models) {
        const opt = document.createElement('option');
        opt.value = m.id;
        const params = (m.paramsB || m.paramsB === 0) ? `${m.paramsB.toFixed(1)}B` : '?';
        const ctx = m.contextWindow || '?';
        opt.textContent = `${m.id} | score=${m.score?.toFixed?.(1) ?? '?'} | ${params} | ctx=${ctx}`;
        list.appendChild(opt);
      }
      q('modelCatalogStatus').textContent = `loaded ${models.length} ${provider} models`;
      if (models[0]) q('model').value = models[0].id;
    };

    q('useListedModel').onclick = async () => {
      const selected = q('modelList').value;
      if (!selected) return;
      q('model').value = selected;
      const provider = q('provider').value;
      const out = await jpost('/api/model/switch', { provider, model: selected });
      topStatus.textContent = `model=${out.provider}/${out.model}`;
    };

    q('send').onclick = async () => {
      const message = q('message').value.trim();
      if (!message) return;
      q('message').value = '';
      pushMsg('user', message);
      const out = await jpost('/api/chat', { sessionId, message });
      const rendered = out.replyHtml ? out.replyHtml : out.reply;
      pushMsg('assistant', out.reply || '(no reply)', rendered);
      topStatus.textContent = `model=${out.model.provider}/${out.model.model}`;
    };
    q('message').addEventListener('keydown', (e) => { if (e.key === 'Enter') q('send').click(); });

    q('saveToken').onclick = async () => {
      await jpost('/api/telegram/config', { botToken: q('tgToken').value.trim(), enabled: true });
      await refreshTelegram();
    };
    q('startTg').onclick = async () => { await jpost('/api/telegram/start'); await refreshTelegram(); };
    q('stopTg').onclick = async () => { await jpost('/api/telegram/stop'); await refreshTelegram(); };
    q('tgRefresh').onclick = refreshTelegram;

    q('saveRuntime').onclick = async () => {
      const out = await jpost('/api/config', {
        runtime: { shellEnabled: q('shellEnabled').checked, maxToolIterations: Number(q('maxIters').value || 8) }
      });
      q('runtimeStatus').textContent = `saved shell=${out.runtime.shellEnabled} maxIters=${out.runtime.maxToolIterations}`;
    };

    q('saveCdp').onclick = async () => {
      const out = await jpost('/api/browser/config', { cdpUrl: q('cdpUrl').value.trim() });
      q('browserStatusLine').textContent = `saved ${out.cdpUrl}`;
      await refreshBrowserConfig();
    };

    q('launchBrowser').onclick = async () => {
      const out = await jpost('/api/browser/launch', {});
      q('browserStatusLine').textContent = out.ok ? `launched pid=${out.pid} at ${out.cdpUrl}` : `launch failed`;
      if (out.cdpUrl) q('cdpUrl').value = out.cdpUrl;
      await refreshBrowserConfig();
    };

    q('navBtn').onclick = async () => {
      const out = await jpost('/api/browser/navigate', { url: q('navUrl').value.trim() });
      q('pcOutput').value = JSON.stringify(out, null, 2);
    };

    q('searchBtn').onclick = async () => {
      const out = await jpost('/api/browser/search', { query: q('searchQ').value.trim() });
      q('pcOutput').value = JSON.stringify(out, null, 2);
    };

    q('extractBtn').onclick = async () => {
      const out = await jpost('/api/browser/extract', { selector: 'body' });
      q('pcOutput').value = out?.text || JSON.stringify(out, null, 2);
    };

    q('runShell').onclick = async () => {
      const out = await jpost('/api/tool/run', { name: 'shell_run', args: { cmd: q('shellCmd').value } });
      q('pcOutput').value = JSON.stringify(out.result, null, 2);
    };

    q('openTargetBtn').onclick = async () => {
      const out = await jpost('/api/tool/run', { name: 'desktop_open', args: { target: q('openTarget').value } });
      q('pcOutput').value = JSON.stringify(out.result, null, 2);
    };

    q('runXdotool').onclick = async () => {
      const out = await jpost('/api/tool/run', { name: 'desktop_xdotool', args: { cmd: q('xdotoolCmd').value } });
      q('pcOutput').value = JSON.stringify(out.result, null, 2);
    };

    (async () => {
      await refreshModel();
      await refreshRuntime();
      await refreshTelegram();
      await refreshBrowserConfig();
    })();
  </script>
</body>
</html>
