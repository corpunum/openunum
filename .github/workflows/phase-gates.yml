name: phase-gates

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Docs Gate
        run: pnpm docs:gate

      - name: Docs Index Freshness
        run: pnpm docs:index:check

      - name: Unit Tests
        run: pnpm test:unit

      - name: Phase0 Foundation Check
        run: pnpm phase0:check

      - name: Compact Profile Gate
        run: pnpm gate:compact-profile

      - name: Packet Budget Gate
        run: pnpm gate:packet-budget

      - name: Runtime Surface Contract Gate
        run: pnpm gate:runtime-surface-contract
